body:
  text: 吳月氏優婆塞支謙譯聞如是一時佛在羅閲祇耆闍崛山中與千二百五十比丘俱菩薩千人皆彌勒等佛告賢者舍利弗及諸比丘皆一心聽佛告賢者舍利弗東方去是一恆沙有佛名安隱囑纍滿具足王如來至真無所著最正覺今現在説法其世界名曰滿所願聚去是二恆沙有佛名紺琉璃具足王如來無所著最正覺今現在説法其世界名曰慈哀光明去是三恆沙有佛名勸助衆善具足王如來無所著最正覺今現在説法其世界名曰歡喜快樂去是四恆沙有佛名曰無憂德具足王如來無所著最正覺今現在説法其世界名曰一切樂入去是五恆沙有佛名藥師具足王如來無所著最正覺今現在説法其世界名曰滿一切珍寶法去是六恆沙有佛名曰蓮華具足王如來無所著最正覺今現在説法其世界名曰滿香名聞去是七恆沙有佛名算擇合會具足王如來無所著最正覺今現在説法其世界名曰一切解説音聲遠聞去是八恆沙有佛名解散一切縛具足王如來無所著最正覺今現在説法其世界名曰一切解脫佛告賢者舍利弗此諸佛如來無所著過四道不受最正覺其國土清淨無五濁無愛欲無意垢若有善男子善女人聞此八佛及國土名受持奉行諷誦廣為他人解説其義者終不愚癡口之所言無有失誤相好具足無所缺減無央數年不為乏少是人終不墮太山地獄餓鬼畜生中也是人終不望取羅漢辟支佛道而般泥洹必當逮得無上平等之道常遇陀鄰尼常行菩薩道得功德無量第一四天王常擁護之不為縣官所拘録不為盜賊所中傷不為天龍鬼神所觸嬈閲叉鬼神蠱道鬼神若人若非人皆不能害殺得其便也除其宿命不請若有疾病水火烏鳴惡夢諸魔所嬈恐怖衣毛竪時常當讀是八吉祥神呪經呪之即得除愈是時佛説偈言若有持是經八佛國土名不墮三惡處疾得無上道自覺發道意見佛即開解中外常歡喜供養心恭敬億劫阿僧祇行惡悉消除持是八吉祥速得明解教供事是經者千葉華中生珍寶為其出色像好無上人聞是尊經尊敬信樂者奉持諷誦讀清淨無放逸女人信是經敬慎無諛諂棄女為男子聰明常黠慧奉持八佛名出入賊不害刀兵水火毒諸邪不能干愛樂奉是經諸魔不得便鬼神諸官屬無能嬈亂者飛行到諸剎所在大豐樂心意正無邪見佛大歡喜所生常遇佛等心奉事之一切衆惡除疾得泥洹道精進無懈怠去離諸緣著為人朴直儒奉持八佛名勇猛降衆魔其力如金剛端正相好具一切莫能當布施無慳貪巨億萬家生盜賊及怨家自然皆消除疾病縣官事烏鳴諸惡夢持是八佛名呪之即除愈奉持是經者彌勒菩薩等第一四天王常共擁護之所願皆可得踊躍大歡喜一心信樂者福德亦如是爾時諸菩薩颰陀和菩薩羅憐那竭菩薩橋曰兜菩薩那羅達菩薩須深彌菩薩摩訶須和薩和菩薩因祗達菩薩和輪調菩薩是八人求道已來無央數劫於今未取佛願言使十方天下人民皆得佛道若有急疾皆當呼我八人名字即得解脫壽命欲終時我八人便當飛往迎逆之諸菩薩彌勒等第一四天王皆白佛言吾當擁護持八吉祥神呪經者與我并力令諸疾病皆得除愈佛説經已舍利弗彌勒菩薩及諸比丘天龍鬼神阿須倫王皆大歡喜樂聞
